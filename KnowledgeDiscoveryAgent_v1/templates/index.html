<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Multi-Agent Research Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>
      body {
        background: linear-gradient(135deg, #e9efff 0%, #ffffff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
      }

      .dashboard-card {
        background: #ffffff;
        border-radius: 1rem;
        padding: 2.5rem 3rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        max-width: 1200px;
        width: 100%;
      }

      .dashboard-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .dashboard-header h1 {
        font-weight: 700;
        font-size: 1.9rem;
        color: #0d6efd;
      }

      .dashboard-header p {
        color: #6c757d;
        font-size: 1rem;
      }

      .form-label {
        font-weight: 600;
        color: #333;
      }

      textarea {
        border-radius: 0.5rem;
        border: 1px solid #d0d7e2;
        resize: vertical;
        min-height: 150px;
      }

      .btn-analyze {
        background: #0d6efd;
        border: none;
        font-weight: 600;
        padding: 0.75rem 1.25rem;
        border-radius: 0.5rem;
        transition: all 0.2s ease-in-out;
      }

      .btn-analyze:hover {
        background: #004cd3;
        transform: translateY(-2px);
      }

      .footer-note {
        text-align: center;
        color: #888;
        font-size: 0.9rem;
        margin-top: 2rem;
      }

      .agent-icons {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 1rem;
      }

      .agent-icons i {
        font-size: 1.8rem;
        color: #0d6efd;
        transition: transform 0.3s;
      }

      .agent-icons i:hover {
        transform: scale(1.1);
        color: #004cd3;
      }
    </style>
  </head>

  <body>
    <div class="dashboard-card">
      <div class="dashboard-header">
        <h1><i class="bi bi-cpu"></i> Collaborative Multi-Agent AI for Deep Domain Research and Knowledge Discovery</h1>
        <p>Collaborative AI agents that gather knowledge, analyze information, and generate insights.</p>

        <div class="agent-icons">
          <i class="bi bi-lightbulb" title="Knowledge Agent"></i>
          <i class="bi bi-bar-chart-line" title="Analysis Agent"></i>
          <i class="bi bi-file-earmark-text" title="Response Agent"></i>
        </div>
      </div>

      <form action="{{ url_for('run') }}" method="post">
        <div class="mb-3">
          <label for="query" class="form-label">Enter your research query</label>
          <textarea id="query" name="query" class="form-control" placeholder="e.g. Recent advancements in AI-driven healthcare diagnosis" required></textarea>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-analyze">
            <i class="bi bi-send-fill"></i> Run Multi-Agent Analysis
          </button>
        </div>
      </form>

      <div class="footer-note mt-4">
        <i class="bi bi-robot"></i> Powered by OpenAI Multi-Agent Framework
      </div>
    </div>
  </body>
</html>
