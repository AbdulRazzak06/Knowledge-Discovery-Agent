<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Results – Multi-Agent Research Dashboard</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
      body {
        background: #f5f7fa;
        font-family: "Segoe UI", sans-serif;
      }

      .page-header {
        border-bottom: 3px solid #0d6efd;
        padding-bottom: 0.4rem;
        margin-bottom: 1.5rem;
      }

      .card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      }

      .card-agent {
        background: #fff;
        border-radius: 0.5rem;
        padding: 1rem;
        font-size: 0.95rem;
        white-space: pre-wrap;
        color: #212529;
        max-height: 350px;
        overflow-y: auto;
      }

      .agent-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        color: #0d6efd;
        font-size: 1.1rem;
      }

      .report-html {
        background: #ffffff;
        border-left: 5px solid #0d6efd;
        border-radius: 0.5rem;
        padding: 1rem 1.2rem;
        line-height: 1.6;
        color: #212529;
      }

      .download-bar {
        background: #eef3ff;
        border: 1px solid #cfe2ff;
        padding: 1rem;
        border-radius: 0.5rem;
        text-align: right;
      }

      .download-bar button {
        min-width: 220px;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <div class="page-header d-flex justify-content-between align-items-center">
        <div>
          <h2 class="fw-bold mb-1">Multi-Agent Research Results</h2>
          <p class="text-muted mb-0">
            <strong>Query:</strong> {{ results.query }}
          </p>
          <small class="text-muted">Generated at {{ results.timestamp }}</small>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-outline-primary"
          ><i class="bi bi-arrow-left"></i> New Query</a
        >
      </div>

      <div class="row g-4 mb-4">
        <!-- Knowledge Agent -->
        <div class="col-md-6">
          <div class="card p-3">
            <div class="agent-title">
              <i class="bi bi-lightbulb"></i> Knowledge Agent
            </div>
            <hr class="mt-2 mb-2" />
            <div class="card-agent">
              {{ results.knowledge | safe }}
            </div>
          </div>
        </div>

        <!-- Analysis Agent -->
        <div class="col-md-6">
          <div class="card p-3">
            <div class="agent-title">
              <i class="bi bi-bar-chart-line"></i> Analysis Agent
            </div>
            <hr class="mt-2 mb-2" />
            <div class="card-agent">
              {{ results.analysis | safe }}
            </div>
          </div>
        </div>
      </div>

      <!-- Final Report -->
      <div class="card p-4 mb-4">
        <div class="agent-title mb-2">
          <i class="bi bi-file-earmark-text"></i> Response Agent – Final Report
        </div>
        <div class="report-html mt-3">
          {{ results.final_html | safe }}
        </div>
      </div>

      <!-- Download Bar -->
      <form action="{{ url_for('download_report') }}" method="post" class="download-bar">
        <input type="hidden" name="final_html" value="{{ results.final_html | safe }}" />
        <input type="hidden" name="title" value="AI_Research_Report" />
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-download"></i> Download HTML Report
        </button>
      </form>
    </div>
  </body>
</html>
